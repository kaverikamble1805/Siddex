<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <progress value="70" max="1000"></progress>
    <meter value="8" min="0" max="10">8/10</meter>
    <script>
        let a = (1, 2, 3);
        console.log(a);

        let marks = 85;
        if (marks >= 90) {
            console.log("Grade: A");
        } else if (marks >= 75) {
            console.log("Grade: B");
        } else {
            console.log("Grade: C");
        }
        let day = 3;
        switch (day) {
            case 1:
                console.log("Monday");
                break;
            case 2:
                console.log("Tuesday");
                break;
            case 3:
                console.log("Wednesday");
                break;
            default:
                console.log("Invalid day");
        }
        for (let i = 1; i <= 5; i++) {
            console.log("Count: " + i);
        }
        for (let i = 2; i <= 10; i++) {
            console.log("number: " + i);

        }
        let i = 1;
        while (i <= 5) {
            console.log("Count: " + i);
            i++;
        }
        function outerFunction(outerVariable) {
            return function innerFunction(innerVariable) {
                console.log(`Outer: ${outerVariable}, Inner: ${innerVariable}`);
            };
        }
        const closureFunc = outerFunction("Outside");
        closureFunc("Inside")

        function fetchData(callback) {
            console.log("Fetching data...");
            callback("Data received");
        }

        function processData(data) {
            console.log(data);
        }

        fetchData(processData)

        function greet(name) {
            return `Hello, ${name}!`;
        }

        function welcome(callback, userName) {
            console.log(callback(userName));
        }

        welcome(greet, "Alice");

        const count = [10, 30, 40, 90];

        const total = count.map(num => num * num);
        console.log(total);

        const filt = count.filter(num => num % 3 === 0);
        console.log("filter: " + filt);

        const reds = count.reduce((total, num) => total + num, 0);
        console.log("reduce:" + reds)
    </script>
</body>

</html>
